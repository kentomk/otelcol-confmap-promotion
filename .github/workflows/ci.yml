name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'
          cache: true
      - name: Install exact vulnerability scanner
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - name: Publisher smoke and full quality gate
        run: tests/publisher-smoke.sh
      - name: Five-version confmap runtime comparison
        run: scripts/runtime-comparison.sh
      - name: Pinned alternatives and agent selection replay
        run: |
          result_file="$(mktemp)"
          scripts/alternatives-comparison.sh >"$result_file"
          scripts/agent-selection-evaluation.sh "$result_file"
